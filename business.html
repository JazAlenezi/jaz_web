<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSINESS | JAZ</title>
    <link rel="icon" type="image/png" href="jaz1.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-bg: #fdfbf9; 
            --deep-mocha: #4B3621; 
            --caramel-linear: linear-gradient(135deg, #C68E17 0%, #E3A857 50%, #7B3F00 100%);
            --text-honey: #C68E17;
            --soft-gold: rgba(198, 142, 23, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* يمنع التمرير لضمان ظهور كل شيء */
            font-family: 'Cairo', sans-serif;
            background-color: var(--main-bg);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .watermark {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: 900;
            color: var(--deep-mocha);
            opacity: 0.02;
            z-index: 0;
            pointer-events: none;
        }

        /* --- القائمة العلوية --- */
        .nav-links { 
            display: flex; 
            gap: 12px; 
            z-index: 1000; 
            justify-content: center; 
            width: 100%; 
            margin: 8px 0; 
            padding: 0;
            list-style: none;
        }

        .nav-links li a { 
            color: var(--deep-mocha); 
            text-decoration: none; 
            opacity: 0.7; 
            font-weight: bold; 
            font-size: 0.75rem;
            padding: 5px;
        }

        .nav-links li a.active { color: var(--text-honey); opacity: 1; }

        /* --- الحاوية الرئيسية --- */
        .content { 
            z-index: 10; 
            width: 92%; 
            max-width: 400px; 
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .biz-card {
            background: white;
            border: 1px solid var(--soft-gold);
            padding: 12px 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(75, 54, 33, 0.05);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .profile-image-container {
            width: 100%;           
            height: 150px; /* حجم متناسق للصورة */
            border-radius: 15px;   
            overflow: hidden;
            margin-bottom: 5px;
        }

        .profile-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
        }

        .page-title { 
            background: var(--caramel-linear); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-size: 1.3rem; 
            margin: 0; 
            font-weight: 700;
            text-align: center;
        }

        .profession { 
            color: var(--deep-mocha); 
            font-size: 0.7rem; 
            margin-bottom: 8px; 
            opacity: 0.8;
            font-weight: bold;
            text-align: center;
        }

        /* روابط التواصل تحت بعض */
        .social-links { 
            display: flex;
            flex-direction: column;
            gap: 6px; 
        }

        .social-item {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: #fafafa;
            padding: 10px 15px;
            border: 1px solid rgba(198, 142, 23, 0.05);
            text-decoration: none; 
            color: var(--deep-mocha);
            font-size: 0.8rem;
            border-radius: 12px;
            font-weight: bold;
        }

        .social-item i { color: var(--text-honey); font-size: 1.1rem; }

        /* زر البريد الإلكتروني */
        .email-btn {
            margin-top: 10px; 
            background: var(--caramel-linear);
            color: white; 
            padding: 12px; 
            text-align: center;
            text-decoration: none;
            font-weight: bold; 
            border-radius: 50px;
            font-size: 0.85rem;
            box-shadow: 0 5px 15px rgba(198, 142, 23, 0.2);
            width: 100%;
            display: block;
            box-sizing: border-box;
        }

        footer {
            padding: 8px;
            font-size: 0.65rem;
            color: var(--deep-mocha);
            text-align: center;
            opacity: 0.7;
        }

        /* لضمان الملاءمة على الشاشات الصغير جداً (مثل iPhone SE) */
        @media screen and (max-height: 700px) {
            .profile-image-container { height: 110px; }
            .social-item { padding: 7px 12px; font-size: 0.75rem; }
            .page-title { font-size: 1.1rem; }
            .email-btn { padding: 10px; margin-top: 5px; }
        }
    </style>
</head>
