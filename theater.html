<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THEATER | JAZ</title>
    <link rel="icon" type="image/png" href="jaz1.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #fdfbf9; 
            --deep-mocha: #1e4b7a; /* الأزرق الملكي */
            --blue-linear: linear-gradient(135deg, #1e4b7a 0%, #4a90e2 50%, #16365a 100%); /* التدرج المعتمد */
            --text-blue: #1e4b7a;
            --soft-blue: rgba(30, 75, 122, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--main-bg);
            color: var(--deep-mocha); 
            margin: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; position: relative; overflow-x: hidden;
        }

        /* --- شريط التنقل --- */
        .nav-links-container { 
            position: relative; 
            top: 40px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 100%;
            margin-bottom: 60px;
            z-index: 1000;
        }
        
        .nav-text-links {
            display: flex;
            gap: 20px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-text-links li { position: relative; }

        .nav-text-links a, .dropdown-trigger { 
            color: var(--deep-mocha); 
            text-decoration: none; 
            opacity: 0.7;
            transition: 0.3s; 
            font-weight: bold; 
            font-size: 0.85rem; 
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            padding: 5px 10px;
        }

        .nav-text-links a:hover, .dropdown:hover .dropdown-trigger, .active-link { 
            opacity: 1; 
            color: var(--text-blue); 
        }

        .dropdown-content {
            display: none; 
            position: absolute;
            top: 100%; 
            right: 0;
            background-color: white; 
            min-width: 130px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border: 1px solid var(--soft-blue);
            border-radius: 10px;
            padding: 8px 0;
            margin-top: 5px;
        }

        .dropdown-content a {
            color: var(--deep-mocha) !important;
            padding: 10px 15px;
            text-decoration: none;
            display: block;
            text-align: right;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .dropdown-content a:hover {
            background-color: var(--soft-blue);
            color: var(--text-blue) !important;
        }

        .dropdown:hover .dropdown-content { display: block; }

        /* المحتوى */
        .content { z-index: 10; padding: 20px; width: 95%; max-width: 500px; text-align: center; margin-top: 20px; }
        .header-title h1 { background: var(--blue-linear); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.2rem; margin: 0; }
        .subtitle { color: var(--deep-mocha); font-size: 0.9rem; margin-bottom: 40px; opacity: 0.7; font-weight: bold; }

        .theater-grid { display: grid; grid-template-columns: 1fr; gap: 20px; justify-items: center; }

        .theater-card {
            background: white;
            border: 1px solid var(--soft-blue);
            padding: 12px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 25px rgba(30, 75, 122, 0.05);
            transition: 0.4s ease;
            position: relative;
            width: 100%;
            max-width: 300px;
        }

        .theater-card:hover { transform: translateY(-10px); border-color: var(--text-blue); }

        .image-container { width: 100%; height: 350px; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .image-container img { width: 100%; height: 100%; object-fit: cover; }

        .play-info h3 { color: var(--deep-mocha); font-size: 0.95rem; margin-bottom: 12px; font-weight: bold; }

        .booking-btn {
            display: inline-block; padding: 10px 20px; background: var(--blue-linear);
            color: white; text-decoration: none; font-size: 0.8rem; font-weight: bold;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(30, 75, 122, 0.2);
        }

        .year-tag {
            position: absolute; top: -10px; right: 15px; background: var(--blue-linear);
            color: white; font-size: 0.7rem; padding: 2px 12px; border-radius: 20px; font-weight: bold;
        }

        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10rem; opacity: 0.02; z-index: 0; pointer-events: none; }

        footer { margin-top: auto; padding: 30px; font-size: 0.7rem; opacity: 0.5; text-align: center; color: var(--deep-mocha); font-weight: bold; }
    </style>
</head>
<body>
    <div class="watermark">STAGE</div>

    <nav class="nav-links-container">
        <ul class="nav-text-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li class="dropdown">
                <button class="dropdown-trigger active-link" style="color: var(--text-blue); opacity: 1;">أعمالي ▾</button>
                <div class="dropdown-content">
                    <a href="drama.html">دراما</a>
                </div>
            </li>
            <!-- تم حذف القائمة المنسدلة وأصبح الرابط مباشراً -->
            <li><a href="BOUTIQAAT.html">مختارات جاز</a></li>
            <li><a href="business.html">تواصل</a></li>
        </ul>
    </nav>

    <div class="content">
        <div class="header-title">
            <h1 style="background: var(--blue-linear); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; margin: 0;">مسرح</h1>
        </div>
        <p class="subtitle">حيث تلتقي الأضواء بالشغف على المسرح ✨</p>

        <div class="theater-grid">
            <div class="theater-card">
                <div class="year-tag">2026</div>
                <div class="image-container">
                    <img src="شوقر دادي.webp" alt="شوقر دادي">
                </div>
                <div class="play-info">
                    <h3>مسرحية شوقر دادي</h3>
                    <a href="https://www.eventat.com/sugar-daddy" target="_blank" class="booking-btn">احجز مقعدك الآن</a>
                </div>
            </div>
        </div>
    </div>

    <footer>جميع الحقوق محفوظة لـ JAZ 2026 ©️   <a href="" target="_blank" style="color: var(--text-blue); text-decoration: none; font-weight: bold;"></a></footer>
</body>
</html>
