        :root {
            --main-bg: #fdfbf9; 
            --deep-mocha: #4B3621; 
            --caramel-linear: linear-gradient(135deg, #C68E17 0%, #E3A857 50%, #7B3F00 100%);
            --text-honey: #C68E17; 
            --soft-gold: rgba(198, 142, 23, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif; 
            background-color: var(--main-bg); 
            color: var(--deep-mocha);
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden; position: relative;
            padding-bottom: 50px;
        }

        /* --- القائمة العلوية الموحدة --- */
        .nav-links { 
            position: relative; 
            top: 40px; /* المسافة الجديدة لتفادي التداخل */
            display: flex; 
            gap: 15px; 
            z-index: 1000; 
            flex-wrap: wrap; 
            justify-content: center; 
            width: 100%; 
            margin-bottom: 60px; 
            padding: 0;
            list-style: none;
        }

        .nav-links li { position: relative; }

        .nav-links li a, .dropdown-trigger { 
            color: var(--deep-mocha); 
            text-decoration: none; 
            opacity: 0.7; 
            transition: 0.3s; 
            font-weight: bold; 
            font-size: 0.8rem; 
            padding: 5px 10px;
            display: block;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }

        .nav-links li a:hover, .dropdown:hover .dropdown-trigger { 
            opacity: 1; 
            color: var(--text-honey); 
        }

        .dropdown-content {
            display: none; 
            position: absolute;
            top: 100%; 
            right: 0;
            background-color: white; 
            min-width: 130px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border: 1px solid var(--soft-gold);
            border-radius: 10px;
            z-index: 1001;
            padding: 8px 0;
            margin-top: 5px;
        }

        .dropdown-content a {
            color: var(--deep-mocha) !important;
            padding: 10px 15px;
            text-decoration: none;
            display: block;
            text-align: right;
            font-size: 0.75rem;
            font-weight: bold;
            opacity: 1 !important;
        }

        .dropdown-content a:hover {
            background-color: var(--soft-gold);
            color: var(--text-honey) !important;
        }

        .dropdown:hover .dropdown-content { display: block; }

        .header-title { z-index: 10; margin-top: 30px; text-align: center; }
        
        .product-container { 
            z-index: 10; 
            width: 95%; 
            max-width: 800px; 
            margin: 20px 0; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .product-card { 
            background: white; 
            border-radius: 20px; 
            padding: 12px; 
            border: 1px solid var(--soft-gold); 
            text-align: center; 
            box-shadow: 0 8px 20px rgba(75, 54, 33, 0.03); 
            transition: 0.3s ease;
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--text-honey); }

        .product-img { width: 100%; height: 280px; border-radius: 15px; overflow: hidden; margin-bottom: 15px; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }

        .product-title { 
            font-size: 0.95rem; 
            font-weight: bold; 
            margin: 10px 0; 
            color: var(--deep-mocha);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .buy-btn { display: block; background: var(--caramel-linear); color: white; padding: 12px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.8rem; box-shadow: 0 4px 12px rgba(198,142,23,0.2); }

        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10rem; font-weight: 900; color: var(--deep-mocha); opacity: 0.02; z-index: 0; pointer-events: none; }

        @media (max-width: 500px) { .product-img { height: 200px; } }

        footer { margin-top: auto; padding: 30px; font-size: 0.7rem; opacity: 0.6; z-index: 10; color: var(--deep-mocha); font-weight: bold; text-align: center; }
    </style>
</head>
