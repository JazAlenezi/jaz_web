<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAMA | JAZ</title>
    <link rel="icon" type="image/png" href="jaz1.jpeg"> 
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #fdfbf9; 
            --deep-mocha: #1e4b7a; /* تم التغيير للأزرق */
            --blue-linear: linear-gradient(135deg, #1e4b7a 0%, #4a90e2 50%, #16365a 100%); /* تدرج أزرق ملكي */
            --text-blue: #1e4b7a;
            --soft-blue: rgba(30, 75, 122, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--main-bg);
            color: var(--deep-mocha); 
            margin: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; position: relative; overflow-x: hidden;
        }

        .nav-links-container { 
            position: relative; 
            top: 40px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 100%;
            margin-bottom: 60px; 
            z-index: 1000;
        }
        
        .nav-text-links {
            display: flex;
            gap: 20px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-text-links li { position: relative; }

        .nav-text-links a, .dropdown-trigger { 
            color: var(--deep-mocha); 
            text-decoration: none; 
            opacity: 0.7;
            transition: 0.3s; 
            font-weight: bold; 
            font-size: 0.85rem; 
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            padding: 5px 10px;
        }

        .nav-text-links a:hover, .dropdown:hover .dropdown-trigger, .active-link { 
            opacity: 1; 
            color: var(--text-blue); 
        }

        .dropdown-content {
            display: none; 
            position: absolute;
            top: 100%; 
            right: 0;
            background-color: white; 
            min-width: 130px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border: 1px solid var(--soft-blue);
            border-radius: 10px;
            padding: 8px 0;
            margin-top: 5px;
        }

        .dropdown-content a {
            color: var(--deep-mocha) !important;
            padding: 10px 15px;
            text-decoration: none;
            display: block;
            text-align: right;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .dropdown-content a:hover {
            background-color: var(--soft-blue);
            color: var(--text-blue) !important;
        }

        .dropdown:hover .dropdown-content { display: block; }

        .content-wrapper { 
            z-index: 10; 
            padding: 20px; 
            width: 90%; 
            max-width: 800px; 
            text-align: center; 
            margin-top: 20px;
        }

        .grid { 
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            width: 100%;
        }

        .card { 
            background: white;
            border: 1px solid var(--soft-blue); 
            padding: 10px; 
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 25px rgba(30, 75, 122, 0.05);
            transition: 0.4s;
            position: relative;
        }

        .card:hover { transform: translateY(-8px); border-color: var(--text-blue); }

        .year-tag {
            position: absolute; top: -10px; right: 10px; background: var(--blue-linear);
            color: white; font-size: 0.7rem; padding: 2px 12px; border-radius: 20px; font-weight: bold;
        }

        .inner-img-box { width: 100%; height: 240px; overflow: hidden; border-radius: 8px; margin-bottom: 15px; }
        .inner-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .card h3 { color: var(--deep-mocha); font-size: 0.95rem; font-weight: bold; margin: 5px 0; }

        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10rem; opacity: 0.02; z-index: 0; pointer-events: none; white-space: nowrap; }

        footer { margin-top: auto; padding: 40px; font-size: 0.7rem; opacity: 0.6; text-align: center; color: var(--deep-mocha); }
    </style>
</head>
<body>
    <div class="watermark">DRAMA</div>

    <nav class="nav-links-container">
        <ul class="nav-text-links">
           
            <li class="dropdown">
                <button class="dropdown-trigger active-link" style="color: var(--text-blue); opacity: 1;">أعمالي ▾</button>
                <div class="dropdown-content">
                    <a href="theater.html">مسرح</a>
                </div>
            </li>
            <li><a href="index.html">تواصل</a></li>
            <!-- تم حذف القائمة المنسدلة وتحويلها لرابط مباشر كما طلبتِ -->
            <li><a href="BOUTIQAAT.html">مختارات جاز</a></li>
            
        </ul>
    </nav>

    <div class="content-wrapper">
        <div class="header-section">
            <h1 style="background: var(--blue-linear); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; margin: 0;">دراما</h1>
            <p style="font-weight: bold; opacity: 0.8; margin-top: 10px; color: var(--text-blue);">بصمة درامية في ذاكرة الشاشة الخليجية</p>
        </div>
        
        <div class="grid">
            <div class="card">
                <div class="year-tag">2026</div>
                <div class="inner-img-box"><img src="ام رجا.webp" alt="مسلسل ام رجا"></div>
                <h3>مسلسل ام رجا</h3> 
            </div>
            <div class="card">
                <div class="year-tag">2026</div>
                <div class="inner-img-box"><img src="بنات عبدالغني.webp" alt="مسلسل بنات عبدالغني"></div>
                <h3>بنات عبدالغني</h3>
            </div>
            <div class="card">
                <div class="year-tag">2024</div>
                <div class="inner-img-box"><img src="صدف.webp" alt="مسلسل صدف"></div>
                <h3>مسلسل صدف</h3>
            </div>
            <div class="card">
                <div class="year-tag">2024</div>
                <div class="inner-img-box"><img src="الفرج بعد الشده.webp" alt="مسلسل الفرج بعد الشدة"></div>
                <h3>الفرج بعد الشده</h3>
            </div>
        </div>
    </div>

    <footer>
        جميع الحقوق محفوظة لـ JAZ 2026 ©️  
        <a href="" target="_blank" style="color: var(--text-blue); text-decoration: none; font-weight: bold;"></a>
    </footer>
</body>
</html>
