<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAZ | BOUTIQAAT</title>
    <link rel="icon" type="image/png" href="jaz1.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #fdfbf9; 
            --deep-mocha: #4B3621; 
            --caramel-linear: linear-gradient(135deg, #C68E17 0%, #E3A857 50%, #7B3F00 100%);
            --text-honey: #C68E17;
            --soft-gold: rgba(198, 142, 23, 0.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--main-bg); 
            color: var(--deep-mocha); 
            margin: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; overflow-x: hidden;
            position: relative;
            padding-bottom: 50px;
        }

        /* --- توحيد القائمة العلوية مع الرئيسية --- */
        .nav-links { 
            position: relative; 
            top: 20px; 
            display: flex; 
            gap: 15px; 
            z-index: 1000; 
            flex-wrap: wrap; 
            justify-content: center; 
            width: 100%; 
            margin-bottom: 40px; 
            padding: 0;
            list-style: none;
        }

        .nav-links li { position: relative; }

        .nav-links li a { 
            color: var(--deep-mocha); 
            text-decoration: none; 
            opacity: 0.7; 
            transition: 0.3s; 
            font-weight: bold; 
            font-size: 0.8rem; /* نفس مقاس الرئيسية */
            padding: 5px 10px;
            display: block;
        }

        .nav-links li a:hover, .nav-links li a.active { 
            opacity: 1; 
            color: var(--text-honey); 
        }

        /* --- تحسين القائمة المنسدلة لتكون واضحة جداً --- */
        .dropdown-content {
            display: none; 
            position: absolute;
            top: 100%; 
            right: 0;
            background-color: white; /* خلفية بيضاء صريحة للوضوح */
            min-width: 130px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* ظل ناعم واحترافي */
            border: 1px solid var(--soft-gold);
            border-radius: 10px;
            z-index: 1001;
            padding: 8px 0;
            margin-top: 10px;
        }

        .dropdown-content a {
            color: var(--deep-mocha) !important;
            padding: 10px 15px;
            text-decoration: none;
            display: block;
            text-align: right;
            font-size: 0.75rem;
            font-weight: bold;
            opacity: 1 !important; /* إلغاء الشفافية داخل المنسدلة */
        }

        .dropdown-content a:hover {
            background-color: var(--soft-gold);
            color: var(--text-honey) !important;
        }

        .dropdown:hover .dropdown-content { display: block; }

        /* --- تصميم محتوى الصفحة --- */
        .header-section { z-index: 10; text-align: center; margin-top: 30px; }
        .system-status { 
            color: var(--deep-mocha); 
            font-size: 0.85rem; 
            margin-top: 10px; 
            margin-bottom: 30px; 
            opacity: 0.8; 
            font-weight: bold; 
        }

        .main-grid { 
            z-index: 10; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            width: 90%; 
            max-width: 1000px; 
        }

        .category-card { 
            background: white; 
            border: 1px solid var(--soft-gold); 
            padding: 15px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(75, 54, 33, 0.05); 
            text-align: center; 
            text-decoration: none; 
            transition: 0.4s ease; 
            display: block;
        }

        .category-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--text-honey); 
            box-shadow: 0 20px 40px rgba(198, 142, 23, 0.1);
        }

        .category-card img { 
            width: 100%; 
            height: 280px; 
            object-fit: cover; 
            border-radius: 15px; 
            margin-bottom: 15px;
        }

        .category-card h3 { 
            color: var(--deep-mocha); 
            margin: 10px 0; 
            font-size: 1.1rem; 
            font-weight: 700;
        }

        .btn-go { 
            display: inline-block; 
            background: var(--caramel-linear); 
            color: white; 
            padding: 10px 30px; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 0.8rem;
            margin-top: 10px;
        }

        footer { 
            margin-top: auto; 
            padding: 40px; 
            font-size: 0.7rem; 
            opacity: 0.6; 
            color: var(--deep-mocha); 
            font-weight: bold; 
            text-align: center;
        }
    </style>
</head>
<body>

    <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li class="dropdown">
            <a href="#">أعمالي <span style="font-size: 0.6rem;">▼</span></a>
            <div class="dropdown-content">
                <a href="drama.html">دراما</a>
                <a href="theater.html">مسرح</a>
            </div>
        </li>
        <li><a href="BOUTIQAAT.html" class="active" style="color: var(--text-honey); opacity: 1;">مختارات جاز</a></li>
        <li><a href="business.html">تواصل</a></li>
    </ul>

    <div class="header-section">
        <div class="system-status">مختارات حصرية من أفضل منتجات جاز ✨</div>
    </div>

    <div class="main-grid">
        <a href="makeup.html" class="category-card">
            <img src="ميكاب.webp" alt="مكياج">
            <h3>قسم المكياج</h3>
            <span class="btn-go">تصفح المجموعة 💄</span>
        </a>

        <a href="skincare.html" class="category-card">
            <img src="عناية.webp" alt="قسم العناية">
            <h3>قسم العناية</h3>
            <span class="btn-go">تصفح المجموعة ✨</span>
        </a>
        
        <a href="perfumes.html" class="category-card">
            <img src="عطور.webp" alt="عطور">
            <h3>عطور جاز</h3>
            <span class="btn-go">تصفح المجموعة ✨</span>
        </a>
    </div>

    <footer>جميع الحقوق محفوظة لـ JAZ 2026 ©️ | تم التطوير بواسطة <a href="https://www.tiktok.com/@shx_ab1" target="_blank" style="color: var(--text-honey); text-decoration: none; font-weight: bold;">SHOUQ🤎🇸🇦</a></footer>

</body>
</html>
